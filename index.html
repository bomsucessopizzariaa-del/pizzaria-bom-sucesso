<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh}
.screen{display:none;padding:20px;max-width:1200px;margin:0 auto}
.screen.active{display:block}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s}
.btn-primary{background:#e94560;color:#fff}
.btn-primary:hover{background:#c73652}
.btn-secondary{background:#16213e;color:#eee;border:1px solid #e94560}
.btn-secondary:hover{background:#0f3460}
.btn-success{background:#28a745;color:#fff}
.btn-success:hover{background:#218838}
.btn-danger{background:#dc3545;color:#fff}
.btn-danger:hover{background:#c82333}
.btn-back{background:#555;color:#fff;margin-bottom:15px}
.btn-back:hover{background:#333}
input,select{padding:10px;border-radius:8px;border:1px solid #444;background:#16213e;color:#eee;font-size:14px;width:100%}
input:focus,select:focus{outline:2px solid #e94560}
.card{background:#16213e;border-radius:12px;padding:20px;margin-bottom:15px;border:1px solid #0f3460}
h1{color:#e94560;margin-bottom:20px;text-align:center}
h2{color:#e94560;margin-bottom:15px}
h3{color:#eee;margin-bottom:10px}
.mesa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:15px}
.mesa-btn{padding:20px;border-radius:12px;border:none;cursor:pointer;font-size:16px;font-weight:700;transition:all 0.2s;text-align:center}
.mesa-livre{background:#28a745;color:#fff}
.mesa-livre:hover{background:#218838}
.mesa-ocupada{background:#e94560;color:#fff}
.mesa-ocupada:hover{background:#c73652}
.login-form{max-width:400px;margin:80px auto;padding:40px;background:#16213e;border-radius:16px;border:1px solid #e94560}
.login-form h1{margin-bottom:30px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;color:#aaa}
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;background:#0f3460;color:#eee;font-size:14px;font-weight:600}
.tab.active{background:#e94560;color:#fff}
.order-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f3460;border-radius:8px;margin-bottom:8px}
.qty-controls{display:flex;align-items:center;gap:10px}
.qty-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center}
.qty-minus{background:#e94560;color:#fff}
.qty-plus{background:#28a745;color:#fff}
.categoria-section{margin-bottom:25px}
.categoria-title{font-size:18px;font-weight:700;color:#e94560;margin-bottom:12px;padding-bottom:5px;border-bottom:1px solid #0f3460}
.menu-item-btn{width:100%;text-align:left;padding:12px;background:#0f3460;border:none;border-radius:8px;color:#eee;cursor:pointer;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.menu-item-btn:hover{background:#1a3a6e}
.price-tag{color:#e94560;font-weight:700}
.total-bar{position:sticky;bottom:0;background:#0f3460;padding:15px;border-radius:12px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e94560}
table{width:100%;border-collapse:collapse}
table th{background:#0f3460;padding:10px;text-align:left}
table td{padding:10px;border-bottom:1px solid #0f3460}
.status-bar{background:#0f3460;padding:10px 15px;border-radius:8px;margin-bottom:15px;font-size:13px;color:#aaa;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-content{background:#16213e;border-radius:16px;padding:30px;max-width:500px;width:90%;border:1px solid #e94560}
.price-options{display:flex;gap:10px;margin-top:10px}
.price-opt-btn{flex:1;padding:15px;border:2px solid #444;border-radius:8px;background:#0f3460;color:#eee;cursor:pointer;font-size:14px;font-weight:600;text-align:center}
.price-opt-btn:hover{border-color:#e94560}
@media(max-width:600px){.mesa-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}}

var state={mesas:{},historico:[],cardapio:[],usuarios:{},currentUser:null,currentMesa:null};
function setSyncStatus(msg,color){var el=document.getElementById('syncStatus');if(el){el.textContent=msg;el.style.color=color||'#aaa';}}
function applyData(result){var data=result.data||result;if(data.mesas)state.mesas=data.mesas;if(data.historico)state.historico=data.historico;if(data.cardapio&&data.cardapio.length>12)state.cardapio=data.cardapio;else if(!state.cardapio||state.cardapio.length<=12)state.cardapio=JSON.parse(JSON.stringify(DEFAULT_CARDAPIO));if(data.usuarios&&Object.keys(data.usuarios).length>0)state.usuarios=data.usuarios;else if(!state.usuarios||Object.keys(state.usuarios).length===0)state.usuarios=JSON.parse(JSON.stringify(USUARIOS_DEFAULT));}
function loadLocalData(){try{var raw=localStorage.getItem('pizzaria_data');if(raw){var parsed=JSON.parse(raw);applyData(parsed);}else{state.cardapio=JSON.parse(JSON.stringify(DEFAULT_CARDAPIO));state.usuarios=JSON.parse(JSON.stringify(USUARIOS_DEFAULT));}}catch(e){state.cardapio=JSON.parse(JSON.stringify(DEFAULT_CARDAPIO));state.usuarios=JSON.parse(JSON.stringify(USUARIOS_DEFAULT));}}
function syncFromSheets(){setSyncStatus('Sincronizando...','#aaa');fetch(SCRIPT_URL+'?action=load').then(function(r){return r.json();}).then(function(result){applyData(result);saveToLocal();setSyncStatus('✅ Sincronizado','#28a745');if(state.currentUser)renderCurrentScreen();}).catch(function(e){setSyncStatus('⚠️ Offline (dados locais)','#e94560');});}
function saveToLocal(){try{localStorage.setItem('pizzaria_data',JSON.stringify({mesas:state.mesas,historico:state.historico,cardapio:state.cardapio,usuarios:state.usuarios}));}catch(e){}}
function saveData(){saveToLocal();fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',data:{mesas:state.mesas,historico:state.historico,cardapio:state.cardapio,usuarios:state.usuarios}})}).then(function(r){return r.json();}).then(function(){setSyncStatus('✅ Salvo','#28a745');}).catch(function(){setSyncStatus('⚠️ Salvo local','#e94560');});}
function renderCurrentScreen(){if(document.getElementById('screenHome').classList.contains('active'))renderMesas();if(document.getElementById('screenCaixa').classList.contains('active')){var t=document.querySelector('#screenCaixa .tab.active');if(t)t.click();else renderCaixaMesas();}}
function doLogin(){var user=document.getElementById('loginUser').value.trim();var pass=document.getElementById('loginPass').value;var u=state.usuarios[user];if(u&&u.senha===pass){state.currentUser={user:user,role:u.role,nome:u.nome};document.getElementById('lblUser').textContent=u.nome+' ('+u.role+')';var b=document.getElementById('btnPainelCaixa');if(u.role==='caixa')b.style.display='inline-block';else b.style.display='none';showScreen('screenHome');renderMesas();}else{document.getElementById('loginErr').textContent='Usuário ou senha incorretos';}}
function doLogout(){state.currentUser=null;state.currentMesa=null;document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginErr').textContent='';showScreen('screenLogin');}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function showHome(){showScreen('screenHome');renderMesas();}
function showCaixa(){showScreen('screenCaixa');switchCaixaTab('mesas');}
function renderMesas(){var grid=document.getElementById('mesaGrid');grid.innerHTML='';for(var i=1;i<=35;i++){var mesa=state.mesas['mesa'+i];var btn=document.createElement('button');btn.className='mesa-btn '+(mesa?'mesa-ocupada':'mesa-livre');btn.style.whiteSpace='pre-wrap';btn.dataset.mesa=i;(function(n){btn.onclick=function(){openMesa(n);};})(i);var t='Mesa '+i+'\n'+(mesa?'🔴':'🟢');btn.textContent=t;grid.appendChild(btn);}}
function openMesa(num){state.currentMesa=num;document.getElementById('mesaTitle').textContent='Mesa '+num;showScreen('screenMesa');document.querySelectorAll('#screenMesa .tab').forEach(function(t,i){t.classList.toggle('active',i===0);});document.getElementById('tabPedido').style.display='block';document.getElementById('tabCardapio').style.display='none';renderOrder();}
function switchTab(tab){document.getElementById('tabPedido').style.display=tab==='pedido'?'block':'none';document.getElementById('tabCardapio').style.display=tab==='cardapio'?'block':'none';document.querySelectorAll('#screenMesa .tab').forEach(function(t){t.classList.remove('active');});var tabBtns=document.querySelectorAll('#screenMesa .tab');if(tab==='pedido'&&tabBtns[0])tabBtns[0].classList.add('active');if(tab==='cardapio'&&tabBtns[1])tabBtns[1].classList.add('active');if(tab==='pedido')renderOrder();if(tab==='cardapio')renderCardapioMenu();}
function switchCaixaTab(tab){var tabs=['mesas','cardapio','relatorios','garcons'];tabs.forEach(function(t){var el=document.getElementById('caixaTab'+t.charAt(0).toUpperCase()+t.slice(1));if(el)el.style.display=t===tab?'block':'none';});document.querySelectorAll('#screenCaixa>.tabs .tab').forEach(function(b,i){b.classList.toggle('active',tabs[i]===tab);});if(tab==='mesas')renderCaixaMesas();if(tab==='cardapio')renderAdminMenu();if(tab==='relatorios')renderRelatorio(_currentRel);if(tab==='garcons')renderGarconsMgmt();}
function renderOrder(){var mesa=state.mesas['mesa'+state.currentMesa];var list=document.getElementById('orderList');list.innerHTML='';if(!mesa||!mesa.itens||mesa.itens.length===0){list.innerHTML='<p style="color:#aaa;text-align:center;padding:20px">Nenhum item no pedido</p>';document.getElementById('orderTotal').textContent='R$ 0,00';return;}var total=0;mesa.itens.forEach(function(item,idx){var div=document.createElement('div');div.className='order-item';var ns=document.createElement('span');ns.textContent=item.nome+(item.tamanho?' ('+item.tamanho+')':'');var ctrl=document.createElement('div');ctrl.className='qty-controls';var mb=document.createElement('button');mb.className='qty-btn qty-minus';mb.textContent='-';(function(i){mb.onclick=function(){changeQty(i,-1);};})(idx);var qs=document.createElement('span');qs.textContent=item.qty;var pb=document.createElement('button');pb.className='qty-btn qty-plus';pb.textContent='+';(function(i){pb.onclick=function(){changeQty(i,1);};})(idx);var ps=document.createElement('span');ps.textContent='R$ '+(item.preco*item.qty).toFixed(2).replace('.',',');ctrl.appendChild(mb);ctrl.appendChild(qs);ctrl.appendChild(pb);ctrl.appendChild(ps);div.appendChild(ns);div.appendChild(ctrl);list.appendChild(div);total+=item.preco*item.qty;});document.getElementById('orderTotal').textContent='R$ '+total.toFixed(2).replace('.',',');}
function changeQty(idx,delta){var key='mesa'+state.currentMesa;if(!state.mesas[key])return;state.mesas[key].itens[idx].qty+=delta;if(state.mesas[key].itens[idx].qty<=0)state.mesas[key].itens.splice(idx,1);saveData();renderOrder();}
function renderCardapioMenu(){var container=document.getElementById('cardapioMenu');container.innerHTML='';var cats={};state.cardapio.forEach(function(item){if(!cats[item.categoria])cats[item.categoria]=[];cats[item.categoria].push(item);});Object.keys(cats).forEach(function(cat){var sec=document.createElement('div');sec.className='categoria-section';var title=document.createElement('div');title.className='categoria-title';title.textContent=cat;sec.appendChild(title);cats[cat].forEach(function(item){var btn=document.createElement('button');btn.className='menu-item-btn';var sizes=Object.keys(item.precos);var pt=sizes.length===1?'R$ '+item.precos[sizes[0]].toFixed(2).replace('.',','):sizes.map(function(s){return s+': R$ '+item.precos[s].toFixed(2).replace('.',',');}).join(' | ');var ns=document.createElement('span');ns.textContent=item.nome;var ps=document.createElement('span');ps.className='price-tag';ps.textContent=pt;btn.appendChild(ns);btn.appendChild(ps);(function(id){btn.onclick=function(){selectItem(id);};})(item.id);sec.appendChild(btn);});container.appendChild(sec);});}
function selectItem(id){var item=state.cardapio.find(function(i){return i.id===id;});if(!item)return;var sizes=Object.keys(item.precos);if(sizes.length===1){addItemToOrder(item,sizes[0],item.precos[sizes[0]]);}else{document.getElementById('modalItemName').textContent=item.nome;var opts=document.getElementById('modalPriceOptions');opts.innerHTML='';sizes.forEach(function(s){var btn=document.createElement('button');btn.className='price-opt-btn';btn.textContent=s+' - R$ '+item.precos[s].toFixed(2).replace('.',',');(function(sid,sprice){btn.onclick=function(){addToOrderSize(id,sid,sprice);};})(s,item.precos[s]);opts.appendChild(btn);});document.getElementById('sizeModal').style.display='flex';}}
function addToOrderSize(id,size,price){var item=state.cardapio.find(function(i){return i.id===id;});if(item)addItemToOrder(item,size,price);closeModal();}
function closeModal(){document.getElementById('sizeModal').style.display='none';}
function addItemToOrder(item,size,price){var key='mesa'+state.currentMesa;if(!state.mesas[key])state.mesas[key]={itens:[],abertura:new Date().toISOString()};var existing=state.mesas[key].itens.find(function(i){return i.id===item.id&&i.tamanho===size;});if(existing)existing.qty++;else state.mesas[key].itens.push({id:item.id,nome:item.nome,tamanho:size,preco:price,qty:1});saveData();switchTab('pedido');renderOrder();}
function fecharMesa(){var key='mesa'+state.currentMesa;var mesa=state.mesas[key];if(!mesa||!mesa.itens||mesa.itens.length===0){alert('Mesa sem itens!');return;}var total=mesa.itens.reduce(function(s,i){return s+i.preco*i.qty;},0);var f={id:Date.now(),mesa:'Mesa '+state.currentMesa,total:total,itens:mesa.itens.map(function(i){return i.nome+(i.tamanho?' ('+i.tamanho+')':'')+' x'+i.qty;}),data:new Date().toISOString(),garcom:state.currentUser?state.currentUser.nome:''};state.historico.push(f);delete state.mesas[key];saveData();showHome();alert('Mesa '+state.currentMesa+' fechada! Total: R$ '+total.toFixed(2).replace('.',','));}
function renderCaixaMesas(){var c=document.getElementById('caixaMesasContainer');c.innerHTML='';var ab=Object.keys(state.mesas);if(ab.length===0){c.innerHTML='<p style="color:#aaa;text-align:center;padding:20px">Nenhuma mesa aberta</p>';return;}ab.forEach(function(key){var mesa=state.mesas[key];var total=mesa.itens.reduce(function(s,i){return s+i.preco*i.qty;},0);var card=document.createElement('div');card.className='card';var hdr=document.createElement('div');hdr.style.cssText='display:flex;justify-content:space-between;align-items:center';var h3=document.createElement('h3');h3.textContent=key.replace('mesa','Mesa ');var pr=document.createElement('strong');pr.style.color='#e94560';pr.textContent='R$ '+total.toFixed(2).replace('.',',');hdr.appendChild(h3);hdr.appendChild(pr);var desc=document.createElement('p');desc.style.cssText='color:#aaa;font-size:13px;margin-top:5px';desc.textContent=mesa.itens.map(function(i){return i.nome+(i.tamanho?' ('+i.tamanho+')':'')+' x'+i.qty;}).join(', ');var btn=document.createElement('button');btn.className='btn btn-success';btn.style.marginTop='10px';btn.textContent='✅ Fechar Mesa';(function(k){btn.onclick=function(){caixaFecharMesa(k);};})(key);card.appendChild(hdr);card.appendChild(desc);card.appendChild(btn);c.appendChild(card);});}
function caixaFecharMesa(key){var mesa=state.mesas[key];if(!mesa)return;var total=mesa.itens.reduce(function(s,i){return s+i.preco*i.qty;},0);var f={id:Date.now(),mesa:key.replace('mesa','Mesa '),total:total,itens:mesa.itens.map(function(i){return i.nome+(i.tamanho?' ('+i.tamanho+')':'')+' x'+i.qty;}),data:new Date().toISOString(),garcom:'Caixa'};state.historico.push(f);delete state.mesas[key];saveData();renderCaixaMesas();}
function renderAdminMenu(){var c=document.getElementById('adminMenu');c.innerHTML='<h2>Cardápio</h2>';var cats={};state.cardapio.forEach(function(item){if(!cats[item.categoria])cats[item.categoria]=[];cats[item.categoria].push(item);});Object.keys(cats).forEach(function(cat){var sec=document.createElement('div');sec.className='card';var h3=document.createElement('h3');h3.textContent=cat;sec.appendChild(h3);cats[cat].forEach(function(item){var row=document.createElement('div');row.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f3460';var ns=document.createElement('span');ns.textContent=item.nome;var ctrl=document.createElement('div');ctrl.style.cssText='display:flex;align-items:center;gap:5px;flex-wrap:wrap';Object.keys(item.precos).forEach(function(s){var lbl=document.createElement('label');lbl.style.cssText='color:#aaa;font-size:12px';lbl.textContent=s+':';var inp=document.createElement('input');inp.type='number';inp.value=item.precos[s];inp.style.cssText='width:70px;display:inline-block;margin:0 5px';(function(id,sz){inp.onchange=function(){updatePrice(id,sz,this.value);};})(item.id,s);ctrl.appendChild(lbl);ctrl.appendChild(inp);});var db=document.createElement('button');db.className='btn btn-danger';db.style.cssText='padding:4px 8px;font-size:12px;margin-left:10px';db.textContent='🗑️';(function(id){db.onclick=function(){deleteMenuItem(id);};})(item.id);ctrl.appendChild(db);row.appendChild(ns);row.appendChild(ctrl);sec.appendChild(row);});c.appendChild(sec);});var af=document.createElement('div');af.className='card';af.innerHTML='<h3>Adicionar Item</h3><div style="display:grid;gap:10px;margin-top:10px"><input id="newItemNome" placeholder="Nome do item"><input id="newItemCat" placeholder="Categoria"><input id="newItemPreco" type="number" placeholder="Preço único"><div style="display:flex;gap:10px"><input id="newItemP" type="number" placeholder="Preço P"><input id="newItemM" type="number" placeholder="Preço M"><input id="newItemG" type="number" placeholder="Preço G"></div><button class="btn btn-success" onclick="addMenuItem()">➕ Adicionar</button></div>';c.appendChild(af);}
function updatePrice(id,size,val){var item=state.cardapio.find(function(i){return i.id===id;});if(item)item.precos[size]=parseFloat(val)||0;saveData();}
function deleteMenuItem(id){if(!confirm('Remover este item?'))return;state.cardapio=state.cardapio.filter(function(i){return i.id!==id;});saveData();renderAdminMenu();}
function addMenuItem(){var nome=document.getElementById('newItemNome').value.trim();var cat=document.getElementById('newItemCat').value.trim();var pu=parseFloat(document.getElementById('newItemPreco').value);var pp=parseFloat(document.getElementById('newItemP').value);var pm=parseFloat(document.getElementById('newItemM').value);var pg=parseFloat(document.getElementById('newItemG').value);if(!nome||!cat){alert('Nome e categoria obrigatórios');return;}var precos={};if(!isNaN(pu)&&pu>0)precos={U:pu};else if(!isNaN(pp)&&!isNaN(pm)&&!isNaN(pg))precos={P:pp,M:pm,G:pg};else{alert('Informe preço(s)');return;}var maxId=state.cardapio.reduce(function(m,i){return Math.max(m,i.id);},0);state.cardapio.push({id:maxId+1,nome:nome,categoria:cat,precos:precos});saveData();renderAdminMenu();}
var _currentRel='hoje';
function switchRel(period){_currentRel=period;document.querySelectorAll('#caixaTabRelatorios>.tabs .tab').forEach(function(t,i){t.classList.toggle('active',['hoje','semana','mes'][i]===period);});renderRelatorio(period);}
function renderRelatorio(period){var now=new Date();var filtered=state.historico.filter(function(f){var d=new Date(f.data);if(period==='hoje')return d.toDateString()===now.toDateString();if(period==='semana'){var w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}if(period==='mes'){var m=new Date(now);m.setDate(m.getDate()-30);return d>=m;}return true;});var c=document.getElementById('relContent');var total=filtered.reduce(function(s,f){return s+f.total;},0);var lbl=period==='hoje'?'Hoje':period==='semana'?'Últimos 7 dias':'Últimos 30 dias';c.innerHTML='<div class="card"><h2 style="color:#e94560">'+lbl+': R$ '+total.toFixed(2).replace('.',',')+'</h2><p style="color:#aaa">'+filtered.length+' fechamento(s)</p></div>';if(filtered.length>0){var tableDiv=document.createElement('div');tableDiv.className='card';var tbl=document.createElement('table');var thead=document.createElement('thead');thead.innerHTML='<tr><th>Mesa</th><th>Total</th><th>Itens</th><th>Horário</th><th>Ação</th></tr>';tbl.appendChild(thead);var tbody=document.createElement('tbody');filtered.slice().reverse().forEach(function(f){var tr=document.createElement('tr');var tdMesa=document.createElement('td');tdMesa.textContent=f.mesa;var tdTotal=document.createElement('td');tdTotal.textContent='R$ '+f.total.toFixed(2).replace('.',',');var tdItens=document.createElement('td');tdItens.style.fontSize='12px';tdItens.textContent=f.itens.join(', ');var tdHora=document.createElement('td');tdHora.style.fontSize='12px';tdHora.textContent=new Date(f.data).toLocaleString('pt-BR');var tdAcao=document.createElement('td');var db=document.createElement('button');db.className='btn btn-danger';db.style.cssText='padding:4px 8px;font-size:12px';db.textContent='🗑️ Apagar';(function(fid){db.onclick=function(){deletarFechamento(fid);};})(f.id);tdAcao.appendChild(db);tr.appendChild(tdMesa);tr.appendChild(tdTotal);tr.appendChild(tdItens);tr.appendChild(tdHora);tr.appendChild(tdAcao);tbody.appendChild(tr);});tbl.appendChild(tbody);tableDiv.appendChild(tbl);c.appendChild(tableDiv);}}
function deletarFechamento(id){var pass=prompt('Digite a senha do caixa para confirmar:');if(pass===null)return;if(pass!==CAIXA_PASS&&!(state.usuarios.caixa&&pass===state.usuarios.caixa.senha)){alert('Senha incorreta!');return;}var f=state.historico.find(function(x){return x.id===id;});if(!f){alert('Não encontrado.');return;}if(!confirm('Apagar fechamento da '+f.mesa+'? Não pode ser desfeito.'))return;state.historico=state.historico.filter(function(x){return x.id!==id;});saveData();renderRelatorio(_currentRel);}
function renderGarconsMgmt(){var c=document.getElementById('garconsMgmt');c.innerHTML='<h2>Gerenciar Garçons</h2>';var lc=document.createElement('div');lc.className='card';var h3=document.createElement('h3');h3.textContent='Garçons Cadastrados';lc.appendChild(h3);var tbl=document.createElement('table');var thead=document.createElement('thead');thead.innerHTML='<tr><th>Usuário</th><th>Nome</th><th>Ação</th></tr>';tbl.appendChild(thead);var tbody=document.createElement('tbody');var garcons=Object.keys(state.usuarios).filter(function(u){return state.usuarios[u].role==='garcom';});if(garcons.length===0){var tr=document.createElement('tr');var td=document.createElement('td');td.colSpan=3;td.style.color='#aaa';td.textContent='Nenhum garçom cadastrado';tr.appendChild(td);tbody.appendChild(tr);}else{garcons.forEach(function(user){var tr=document.createElement('tr');var tdU=document.createElement('td');tdU.textContent=user;var tdN=document.createElement('td');tdN.textContent=state.usuarios[user].nome;var tdA=document.createElement('td');var db=document.createElement('button');db.className='btn btn-danger';db.style.cssText='padding:4px 8px;font-size:12px';db.textContent='🗑️ Deletar';(function(u){db.onclick=function(){deletarGarcom(u);};})(user);tdA.appendChild(db);tr.appendChild(tdU);tr.appendChild(tdN);tr.appendChild(tdA);tbody.appendChild(tr);});}tbl.appendChild(tbody);lc.appendChild(tbl);c.appendChild(lc);var ac=document.createElement('div');ac.className='card';ac.innerHTML='<h3>Adicionar Garçom</h3><div style="display:grid;gap:10px;margin-top:10px"><input id="newGarcomUser" placeholder="Nome de usuário (ex: garcom7)"><input id="newGarcomNome" placeholder="Nome completo"><input id="newGarcomSenha" type="password" placeholder="Senha do novo garçom"><input id="newGarcomAdminPass" type="password" placeholder="Senha do caixa (confirmar)"><button class="btn btn-success" onclick="adicionarGarcom()">➕ Adicionar Garçom</button></div><p id="garcomMsg" style="margin-top:10px;text-align:center"></p>';c.appendChild(ac);}
function adicionarGarcom(){var user=document.getElementById('newGarcomUser').value.trim().toLowerCase();var nome=document.getElementById('newGarcomNome').value.trim();var senha=document.getElementById('newGarcomSenha').value;var adminPass=document.getElementById('newGarcomAdminPass').value;var msg=document.getElementById('garcomMsg');if(!user||!nome||!senha){msg.style.color='#e94560';msg.textContent='Preencha todos os campos.';return;}if(adminPass!==CAIXA_PASS&&!(state.usuarios.caixa&&adminPass===state.usuarios.caixa.senha)){msg.style.color='#e94560';msg.textContent='Senha do caixa incorreta!';return;}if(state.usuarios[user]){msg.style.color='#e94560';msg.textContent='Usuário já existe!';return;}state.usuarios[user]={senha:senha,role:'garcom',nome:nome};saveData();msg.style.color='#28a745';msg.textContent='Garçom '+nome+' adicionado!';document.getElementById('newGarcomUser').value='';document.getElementById('newGarcomNome').value='';document.getElementById('newGarcomSenha').value='';document.getElementById('newGarcomAdminPass').value='';renderGarconsMgmt();}
function deletarGarcom(user){var pass=prompt('Senha do caixa para deletar '+user+':');if(pass===null)return;if(pass!==CAIXA_PASS&&!(state.usuarios.caixa&&pass===state.usuarios.caixa.senha)){alert('Senha incorreta!');return;}if(!confirm('Deletar "'+user+'" ('+state.usuarios[user].nome+')?'))return;delete state.usuarios[user];saveData();renderGarconsMgmt();}
function init(){loadLocalData();showScreen('screenLogin');syncFromSheets();}
init();
</script>
